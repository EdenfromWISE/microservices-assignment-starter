openapi: 3.0.3
info:
  title: Rental Service API
  description: Manages rental lifecycle and state transitions in the car rental system
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Via Gateway

paths:
  /rentals:
    post:
      summary: Create a new rental
      tags: [Rentals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentalCreateDTO'
      responses:
        '201':
          description: Rental created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rental'
        '400':
          description: Invalid request
    get:
      summary: List rentals
      tags: [Rentals]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: customerId
          in: query
          schema:
            type: string
        - name: vehicleId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RentalStatus'
      responses:
        '200':
          description: Paginated rentals

  /rentals/{rentalId}:
    get:
      summary: Get rental by ID
      tags: [Rentals]
      parameters:
        - name: rentalId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rental details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rental'
        '404':
          description: Rental not found

  /rentals/{rentalId}/confirm:
    patch:
      summary: Confirm a pending rental
      tags: [Rentals]
      parameters:
        - $ref: '#/components/parameters/RentalId'
      responses:
        '200':
          description: Rental confirmed

  /rentals/{rentalId}/pickup:
    patch:
      summary: Mark rental as picked up
      tags: [Rentals]
      parameters:
        - $ref: '#/components/parameters/RentalId'
      responses:
        '200':
          description: Pickup completed

  /rentals/{rentalId}/return:
    patch:
      summary: Mark vehicle as returned
      tags: [Rentals]
      parameters:
        - $ref: '#/components/parameters/RentalId'
      responses:
        '200':
          description: Return completed

  /rentals/{rentalId}/inspection:
    patch:
      summary: Complete return inspection
      tags: [Rentals]
      parameters:
        - $ref: '#/components/parameters/RentalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionDTO'
      responses:
        '200':
          description: Inspection completed

  /rentals/{rentalId}/complete:
    patch:
      summary: Complete rental workflow
      tags: [Rentals]
      parameters:
        - $ref: '#/components/parameters/RentalId'
      responses:
        '200':
          description: Rental completed

  /rentals/{rentalId}/cancel:
    patch:
      summary: Cancel rental
      tags: [Rentals]
      parameters:
        - $ref: '#/components/parameters/RentalId'
        - name: reason
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Rental cancelled

  /rentals/{rentalId}/penalty:
    patch:
      summary: Update penalty amount
      tags: [Rentals]
      parameters:
        - $ref: '#/components/parameters/RentalId'
        - name: amount
          in: query
          required: true
          schema:
            type: number
      responses:
        '200':
          description: Penalty updated

  /rentals/{rentalId}/history:
    get:
      summary: Get rental state transition history
      tags: [Rentals]
      parameters:
        - $ref: '#/components/parameters/RentalId'
      responses:
        '200':
          description: Rental history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RentalStateHistory'

  /rentals/health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              example:
                status: ok

components:
  parameters:
    RentalId:
      name: rentalId
      in: path
      required: true
      schema:
        type: string

  schemas:
    RentalCreateDTO:
      type: object
      required: [customerId, vehicleId, startDate, endDate, pickupLocation, returnLocation, dailyRate]
      properties:
        customerId:
          type: string
        vehicleId:
          type: string
        partnerId:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        pickupLocation:
          type: string
        returnLocation:
          type: string
        dailyRate:
          type: number
        depositAmount:
          type: number

    InspectionDTO:
      type: object
      properties:
        hasDamage:
          type: boolean
        inspectionNotes:
          type: string
        damageReportId:
          type: string

    Rental:
      type: object
      properties:
        rentalId:
          type: string
        customerId:
          type: string
        vehicleId:
          type: string
        partnerId:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        actualReturnDate:
          type: string
          format: date-time
        pickupLocation:
          type: string
        returnLocation:
          type: string
        dailyRate:
          type: number
        totalCost:
          type: number
        depositAmount:
          type: number
        status:
          $ref: '#/components/schemas/RentalStatus'
        inspectionNotes:
          type: string
        hasDamage:
          type: boolean
        damageReportId:
          type: string
        penaltyAmount:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RentalStateHistory:
      type: object
      properties:
        historyId:
          type: string
        rentalId:
          type: string
        fromStatus:
          $ref: '#/components/schemas/RentalStatus'
        toStatus:
          $ref: '#/components/schemas/RentalStatus'
        changedAt:
          type: string
          format: date-time
        notes:
          type: string

    RentalStatus:
      type: string
      enum: [PENDING, CONFIRMED, IN_PROGRESS, INSPECTION, COMPLETED, PENALTY_DUE, CANCELLED]
